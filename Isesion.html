<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - BambuSteel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;1,800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Montserrat', Tahoma, sans-serif; }
        body {
            background-color: blanchedalmond; 
            background-image: radial-gradient(rgba(44, 94, 59, 0.15) 2px, transparent 2px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            width: 100%;
        }
        .login-card {
            background-color: white;
            padding: 40px;
            box-shadow: 12px 12px 0px #2c5e3b;
            width: 100%;
            max-width: 380px;
            border: 3px solid #2c5e3b; 
            text-align: center;
            margin: auto;
            position: relative;
        }
        h2 {
            color: #2c5e3b; margin-bottom: 30px; font-weight: 800; font-style: italic;
            text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .hoja-simple { width: 22px; height: 22px; background-color: #2c5e3b; border-radius: 0 80% 0 80%; transform: rotate(-15deg); }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #2c5e3b; font-weight: 800; font-style: italic; text-transform: uppercase; font-size: 0.85em; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #ccc; font-weight: 600; background-color: #f9f9f9; outline: none; }
        input:focus { border-color: #2c5e3b; background-color: white; box-shadow: 6px 6px 0px rgba(44, 94, 59, 0.3); transform: translate(-2px, -2px); }
        .btn-container { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn { padding: 14px; font-weight: 800; font-style: italic; text-transform: uppercase; cursor: pointer; text-decoration: none; transform: skewX(-10deg); transition: all 0.2s ease; display: inline-block; }
        .btn span { display: inline-block; transform: skewX(10deg); }
        .btn-principal { background-color: #2c5e3b; color: blanchedalmond; box-shadow: 6px 6px 0px rgba(44, 94, 59, 0.4); border: none; }
        .btn-principal:hover { background-color: white; color: #2c5e3b; border: 2px solid #2c5e3b; box-shadow: 8px 8px 0px #2c5e3b; transform: skewX(-10deg) translate(-2px, -2px); }
        .btn-regreso { background-color: #a52a2a; color: white; font-size: 0.85em; box-shadow: 4px 4px 0px rgba(165, 42, 42, 0.4); border: none; text-align: center; }
        .btn-regreso:hover { background-color: white; color: #a52a2a; border: 2px solid #a52a2a; box-shadow: 6px 6px 0px #a52a2a; transform: skewX(-10deg) translate(-2px, -2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>
            <div class="hoja-simple"></div>
            <span>BambuSteel</span>
        </h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="usuario">Correo electrónico (Usuario):</label>
                <input type="email" id="usuario" placeholder="tu@correo.com" required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="btn-container">
                <button type="submit" class="btn btn-principal"><span>Iniciar Sesión</span></button>
                <a href="Iregistro.html" class="btn btn-regreso"><span>No tengo cuenta, registrarme</span></a>
            </div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const datosLogin = {
                usuario: document.getElementById('usuario').value,
                password: document.getElementById('password').value
            };

            try {
                const respuesta = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosLogin)
                });
                const resultado = await respuesta.json();

                if (respuesta.ok && resultado.login) {
                    alert(resultado.mensaje);
                    window.location.href = "Menu.html"; 
                } else {
                    alert(resultado.mensaje || 'Error al iniciar sesión');
                }
            } catch (err) {
                alert('Error al conectar con el servidor.');
            }
        });
    </script>
</body>
</html>
